services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gochess}
      POSTGRES_USER: ${POSTGRES_USER:-gochess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gochess}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
